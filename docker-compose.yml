# transfer.sh deployment stack
#
# Usage:
#   cp .env.example .env             # then edit .env
#   htpasswd -B -c htpasswd <user>   # create the auth file BEFORE first start
#   docker compose up -d
#
# Reverse-proxy (TLS termination) is expected to live OUTSIDE this compose file
# and forward to the `transfersh` service over the shared network.

name: transfersh

services:
  transfersh:
    image: ${TRANSFERSH_IMAGE:-ghcr.io/OWNER/REPO:latest}
    restart: unless-stopped
    depends_on:
      clamav:
        condition: service_healthy
    environment:
      LISTENER: ":8080"
      BASEDIR: "/data"
      TEMP_PATH: "/tmp/transfersh"
      PURGE_DAYS: "${PURGE_DAYS:-360}"
      PURGE_INTERVAL: "${PURGE_INTERVAL:-24}"
      MAX_UPLOAD_SIZE: "${MAX_UPLOAD_SIZE:-5242880}"   # in KB, default 5 GiB
      RATE_LIMIT: "${RATE_LIMIT:-0}"
      RANDOM_TOKEN_LENGTH: "${RANDOM_TOKEN_LENGTH:-10}"
      CLAMAV_HOST: "clamav:3310"
      PERFORM_CLAMAV_PRESCAN: "${PERFORM_CLAMAV_PRESCAN:-true}"
      HTTP_AUTH_HTPASSWD: "/etc/transfersh/htpasswd"
      HTTP_AUTH_IP_WHITELIST: "${HTTP_AUTH_IP_WHITELIST:-}"
      IP_WHITELIST: "${IP_WHITELIST:-}"
      IP_BLACKLIST: "${IP_BLACKLIST:-}"
      CORS_DOMAINS: "${CORS_DOMAINS:-}"
      PROXY_PATH: "${PROXY_PATH:-}"
      PROXY_PORT: "${PROXY_PORT:-}"
      EMAIL_CONTACT: "${EMAIL_CONTACT:-}"
    volumes:
      - transfersh-data:/data
      - type: bind
        source: ./htpasswd
        target: /etc/transfersh/htpasswd
        read_only: true
        bind:
          create_host_path: false
    networks:
      - transfersh
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: ${TRANSFERSH_MEMORY_LIMIT:-512M}
    security_opt:
      - no-new-privileges:true

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    networks:
      - transfersh
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5m
    mem_limit: ${CLAMAV_MEMORY_LIMIT:-2G}
    security_opt:
      - no-new-privileges:true

volumes:
  transfersh-data:
  clamav-db:

networks:
  transfersh:
    driver: bridge
