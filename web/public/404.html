<!DOCTYPE html>
<html lang="en" data-theme-default="{{theme_default}}">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 &middot; not found</title>
  <link rel="icon" href="{{favicon_url}}">
  <link rel="stylesheet" href="{{asset "/styles/main.css"}}">
  {{theme_bootstrap}}
</head>
<body>
  <main class="page">
    <section class="card not-found">
      <img class="logo" src="{{logo_url}}" alt="">
      <h1>404</h1>
      <p>Nothing here. The link may have expired or never existed.</p>
      <p><a class="button" href="/">Back to home</a></p>
    </section>

    <footer class="footer">
      <span class="footer-version">{{if build_version}}{{build_version}}{{end}}</span>
      <span class="footer-mid">{{with contact_email}}<a href="mailto:{{.}}">contact</a>{{end}}</span>
      <a class="footer-link" href="https://github.com/xenofex7/transfer.sh" target="_blank" rel="noopener">
        <i data-lucide="git-branch"></i><span>source on github</span>
      </a>
    </footer>
  </main>
  <script src="{{asset "/scripts/lucide.min.js"}}" defer></script>
  <script src="{{asset "/scripts/toast.js"}}" defer></script>
  <script src="{{asset "/scripts/changelog-modal.js"}}" defer></script>
  <script src="{{asset "/scripts/theme-toggle.js"}}" defer></script>
</body>
</html>
