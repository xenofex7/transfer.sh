<!DOCTYPE html>
<html lang="en" data-theme-default="{{theme_default}}">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Filename}} &middot; {{.Hostname}}</title>
  <link rel="icon" href="{{favicon_url}}">
  <link rel="stylesheet" href="{{asset "/styles/main.css"}}">
  {{theme_bootstrap}}
</head>
<body>
  <main class="page">
    <header class="preview-head">
      <a class="logo-link" href="/" aria-label="Home"><img class="logo logo-small" src="{{logo_url}}" alt=""></a>
      <h1 class="filename">{{.Filename}}</h1>
      <p class="meta-inline">
        <span class="content-type">{{.ContentType}}</span>
        <span class="dot">&middot;</span>
        <span class="size">{{.ContentLength}} bytes</span>
      </p>
    </header>

    <section class="card prose">
      {{.Content}}
    </section>

    <section class="card actions">
      <a class="button primary" href="{{.URLGet}}" download>Download original</a>
    </section>

    <footer class="footer">
      <a href="/">{{.Hostname}}</a>
    </footer>
  </main>
  <script src="{{asset "/scripts/theme-toggle.js"}}" defer></script>
</body>
</html>
