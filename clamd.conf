## clamd config for the bundled docker-compose stack.
## Mounted into clamav/clamav:1.4 at /etc/clamav/clamd.conf to lift the
## default 25M scan limits to match transfersh's MAX_UPLOAD_SIZE (5 GiB).

LogTime yes
LogClean no
PidFile /run/clamav/clamd.pid
TemporaryDirectory /tmp
DatabaseDirectory /var/lib/clamav
LocalSocket /tmp/clamd.sock
LocalSocketGroup clamav
LocalSocketMode 660
TCPSocket 3310
TCPAddr 0.0.0.0
User clamav

MaxConnectionQueueLength 200
MaxThreads 12
MaxQueue 200
ReadTimeout 600
CommandReadTimeout 30
SendBufTimeout 200
IdleTimeout 60
SelfCheck 600

StreamMaxLength 6G
MaxFileSize 6G
MaxScanSize 6G
MaxRecursion 20
MaxFiles 20000

ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
ScanSWF yes
ScanMail yes
ScanArchive yes
ArchiveBlockEncrypted no

DetectPUA no
DisableCertCheck yes

ExcludePath ^/proc/
ExcludePath ^/sys/
