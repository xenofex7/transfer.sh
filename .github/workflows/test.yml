name: test

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  test:
    name: Test (Go ${{ matrix.go_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go_version: ['1.25']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go_version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version }}
          check-latest: true
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --config .golangci.yml

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # govulncheck v1.3+ requires Go 1.25; keep this independent
          # of the test matrix so it can move forward on its own.
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
